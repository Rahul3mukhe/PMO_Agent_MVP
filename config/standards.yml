org:
  name: "ACME PMO"
  doc_header: "ACME PMO - Confidential"
  doc_footer: "Generated by PMO Agent - For Internal Use Only"

project_types:
  Default:
    required_docs_before_start:
      - proof_of_value
      - rough_order_estimation
      - team_sizing
    required_docs_start_gate:
      - risk_registry
    required_before_end_metrics:
      - total_time_taken_days
      - actual_budget_consumed
    required_docs_end_gate: []

  Regulated:
    inherits: "Default"
    required_docs_start_gate:
      - risk_registry
    required_docs_end_gate:
      - budget_statement

docs:
  proof_of_value:
    title: "Proof of Value"
    required_sections:
      - Purpose
      - Scope
      - Business Value
      - Success Metrics
      - Assumptions
      - Approvals
    min_total_lines: 12
    must_include_any_keywords:
      - ["value", "benefit"]
    must_include_all_keywords:
      - ["scope"]

  rough_order_estimation:
    title: "Rough Order of Estimation (ROE)"
    required_sections:
      - Overview
      - Cost Estimate
      - Effort Estimate
      - Assumptions
      - Confidence Level
      - Approvals
    min_total_lines: 10
    must_include_all_keywords:
      - ["estimate"]

  team_sizing:
    title: "Team Sizing"
    required_sections:
      - Overview
      - Roles and Headcount
      - RACI
      - Timeline Coverage
      - Approvals
    min_total_lines: 9
    must_include_any_keywords:
      - ["roles", "headcount"]

  risk_registry:
    title: "Risk Registry"
    required_sections:
      - Overview
      - Risk Summary
      - Detailed Risks
      - Mitigations
      - Owners
      - Registry Overview
      - Risk List
      - Review Cadence
      - Approvals
    min_total_lines: 20
    min_bullets: 5

  budget_statement:
    title: "Budget Statement"
    required_sections:
      - Overview
      - Baseline Budget
      - Actuals
      - Variance Explanation
      - Forecast
      - Approvals
    min_total_lines: 10
    must_include_all_keywords:
      - ["budget", "variance"]

quality:
  reject_if_contains:
    - "tbd"
    - "lorem"
    - "to be decided"
    - "n/a"